name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: agentd-x86_64-linux.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: agentd-aarch64-macos.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: agentd-x86_64-windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release -p daemon -p agentd-cli

      # Windows-only helper; built and shipped only in the Windows archive.
      - name: Build network broker (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release -p agentd-netbroker

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/daemon target/release/agentctl dist/
          cp README.md LICENSE dist/
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/daemon.exe dist/
          Copy-Item target/release/agentctl.exe dist/
          # Ships alongside daemon.exe; the daemon locates it in its own folder.
          Copy-Item target/release/agentd-netbroker.exe dist/
          Copy-Item README.md, LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  draft:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read workspace version
        id: version
        run: echo "version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*\"(.*)\".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*
